<style>
#comments { margin-top: 3rem; padding: 0 15px; }
.c-item { margin: 1.2rem 0; }
.c-reply { margin-left: 1.5rem; padding-left: 1rem; border-left: 2px solid var(--text-decoration-color); }
.c-meta { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.3rem; font-size: 0.85em; }
.c-name { font-weight: bold; color: var(--text-color); }
.c-time { color: var(--text-pale-color); }
.c-reply-btn {
  background: none; border: none; padding: 0;
  color: var(--primary-color); cursor: pointer;
  font-size: 0.85em; opacity: 0;
  transition: opacity 0.15s;
}
.c-item:hover .c-reply-btn { opacity: 1; }
.c-body { color: var(--text-color); line-height: var(--line-height); white-space: pre-wrap; word-break: break-word; }
.c-loading, .c-empty { color: var(--text-pale-color); font-size: 0.9em; padding: 1rem 0; }
.c-form { margin-top: 2rem; display: flex; flex-direction: column; gap: 0.6rem; }
.c-form-row { display: flex; gap: 0.6rem; }
.c-input {
  width: 100%; padding: 0.5rem 0.7rem;
  border: 1.5px solid var(--text-decoration-color);
  border-radius: 4px;
  background: var(--bg-color); color: var(--text-color);
  font-size: 0.9em; font-family: var(--main-font);
  outline: none; transition: border-color 0.15s;
}
.c-input:focus { border-color: var(--primary-color); }
.c-input-content { resize: vertical; min-height: 100px; }
.c-reply-tip {
  font-size: 0.85em; color: var(--primary-color);
  padding: 0.2rem 0.5rem;
  background: var(--inline-code-bg-color);
  border-radius: 4px; align-self: flex-start;
}
.c-reply-tip::after { content: " ✕"; opacity: 0.5; }
.c-form-actions { display: flex; justify-content: flex-end; }
.c-submit {
  padding: 0.4rem 1.2rem;
  background: var(--primary-color); color: var(--bg-color);
  border: none; border-radius: 4px;
  cursor: pointer; font-size: 0.9em;
  transition: opacity 0.15s;
}
.c-submit:hover { opacity: 0.85; }
.c-submit:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
<div id="comments" data-page="{{ current_path }}"></div>
<script src="/comments.js"></script>
